[[knobs]]
enable_native_cdc = true

[[test]]
testTitle = 'NativeCdcEndToEnd'
useDB = true
waitForQuiescenceEnd = false
timeout = 300

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 12
    minStreamCount = 6
    maxStreamCount = 20
    keyCount = 16
    writesPerRound = 5
    rounds = 30
    drainProbability = 0.25
    delayBetweenRounds = 0.5
    operationTimeout = 120.0

    [[test.workload]]
    testName = 'Attrition'
    machinesToKill = 3
    machinesToLeave = 3
    reboot = true
    testDuration = 20.0
