[configuration]
storageEngineExcludeTypes = ["ssd-sharded-rocksdb"] #FIXME: remove after allowing to do bulkloading with fetchKey and shardedrocksdb

disableTss = true # TODO(BulkLoad): support TSS. finishMoveShard should wait for TSS if a data move is bulkload data move.

# DD's bulk-load team selection rejects any team that shares a server with the source team
# (DDTeamCollection.actor.cpp:266-282). Pin redundancy to 'triple' (matching
# PhysicalShardMove and StorageServerCheckpointRestore which exercise similar bulk-load
# paths) so the simulator cannot pick three_data_hall or other modes whose tighter
# topology constraints leave team selection with no disjoint candidate team -- the
# test would then stall on DDBulkLoadEngineTaskGetTeamFailedToFindValidTeam, the load
# would produce no data, and the workload's processCheck assertion would fire
# (BulkDumpingWorkLoadError KVS=N NewKVS=0).
config = 'triple'

# Pair the pinned redundancy with enough machines to guarantee a disjoint team.
machineCount = 15

# Without datacenters=1 the simulator picks randomInt(1,4) DCs (SimulatedCluster.cpp
# line ~1610). When it picks 2, the 15 machines get split ~7-8 per DC, the primary
# DC then has only 4-5 non-source servers under triple replication, and DD's bulk-load
# team selection can fail to find a disjoint candidate. Pin to a single DC so all
# 15 machines participate in team formation.
datacenters = 1

# This test validates bulk-dump mechanics, not multi-region DR. Forcing single-region
# avoids the same team-diversity stall when machineCount gets split across regions.
generateFearless = false

[[knobs]]
# This knob is commented out since the knob override is done *after* the simulation system is set up. However,
# this is not going to completely work:
# The purpose of setting the knob to true was to enable the shard rocksdb storage engine
# The shard rocksdb storage engine is set up before this knob is overridden
# The temporary fix is that in SimulatedCluster.cpp:simulationSetupAndRun, we are doing one additional check.
shard_encode_location_metadata = true

# Rely on RangeLock
enable_read_lock_on_range = true

# Do not support version vector
enable_version_vector = false
enable_version_vector_tlog_unicast = false
enable_version_vector_reply_recovery = false

# Set high enough sample rate to test bytes sampling
min_byte_sampling_probability = 0.5

# CC can repeatedly re-recruit new DD for the unfit recruitment which can block the test.
cc_enforce_use_unfit_dd_in_sim = true

# AuditStorage replica check can cause tooManyTraceEvents because both tests are large
disable_audit_storage_final_replica_check_in_sim = true

# Since the machineCount is large, this test produces more trace events to complete
max_trace_lines = 5000000

[[test]]
testTitle = 'BulkDumpingWorkload'
useDB = true
waitForQuiescence = false

    [[test.workload]]
    testName = 'BulkDumpingWorkload'
    # 1 is BulkLoadTransportMethod::CP
    bulkLoadTransportMethod = 1
    # The default 60s is too short under this test's fault injection: a CommitProxy failure
    # plus a rebooting process in a (possibly 2-region) cluster can leave the database
    # unavailable for >60s while recovery hits no_more_servers, so the submitBulkDumpJob
    # transaction can't commit in time and start() fails with timed_out. Raise the cap well
    # above worst-case recovery; the submit still retries underneath.
    jobSubmitTimeout = 600.0
