[configuration]
config = '''double remote_double usable_regions=2 regions=[{"datacenters":[{"id":"0","priority":2},{"id":"2","priority":1,"satellite":1}],"satellite_redundancy_mode":"one_satellite_single"},{"datacenters":[{"id":"1","priority":1},{"id":"3","priority":1,"satellite":1}],"satellite_redundancy_mode":"one_satellite_single"}]'''
# The test targets CDC replay through satellites, not randomized stateless role saturation.
desiredTLogCount = 2
remoteDesiredTLogCount = 2
commitProxyCount = 1
grvProxyCount = 1
resolverCount = 1
minimumRegions = 2
singleRegion = true
generateFearless = false
datacenters = 4
machineCount = 32
processesPerMachine = 1
buggify = false
faultInjection = true

[[knobs]]
enable_native_cdc = true

[[test]]
testTitle = 'NativeCdcSatellite'
useDB = true
waitForQuiescenceEnd = false
runConsistencyCheck = false
timeout = 600
connectionFailuresDisableDuration = 1000000
runFailureWorkloads = false

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 4
    minStreamCount = 2
    maxStreamCount = 6
    keyCount = 8
    writesPerRound = 3
    rounds = 12
    drainProbability = 0.5
    delayBetweenRounds = 0.5
    operationTimeout = 500.0

    [[test.workload]]
    testName = 'Attrition'
    machinesToKill = 1
    machinesToLeave = 3
    reboot = true
    testDuration = 8.0
    waitForVersion = true
    allowFaultInjection = false
    killDc = true
