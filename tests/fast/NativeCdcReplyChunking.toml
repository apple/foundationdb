[configuration]
config = 'single'
singleRegion = true
buggify = false
faultInjection = false

[[knobs]]
enable_native_cdc = true
native_cdc_tag_count = 1
# Each commit version fits either reply bound, while several versions together do not.
maximum_peek_bytes = 4096
cdc_proxy_consume_reply_bytes = 4096
cdc_proxy_buffer_bytes = 65536
cdc_proxy_consume_poll_timeout = 30.0

[[test]]
testTitle = 'NativeCdcReplyChunking'
useDB = true
waitForQuiescenceEnd = false
connectionFailuresDisableDuration = 1000000

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 1
    minStreamCount = 1
    maxStreamCount = 1
    keyCount = 4
    writesPerRound = 1
    rounds = 0
    testReplyChunking = true
    memoryTestValueBytes = 1024
    operationTimeout = 120.0
