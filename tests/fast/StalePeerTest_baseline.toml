# Baseline variant of StalePeerTest: the SAME workload (dstKillRole=clientFacing,
# srcCheckRole=tester_client + Cycle traffic) but with all of our functional
# client-side stale-peer FIXES turned OFF. Used to establish that the test
# actually detects the problem: without the fixes a customer client should
# retain stale peer references to a killed client-facing dst, so this config is
# expected to FAIL at a meaningful rate. Compare against StalePeerTest.toml
# (fixes ON) to confirm the fixes work.
#
# Knobs left at their original (pre-fix) state below; everything else mirrors
# StalePeerTest.toml. The reconnect-throttle knobs are already off in simulation
# (MAX_RECONNECTION_TIME/GROWTH/RESET are isSimulated-gated to the original
# 0.5/1.2/5.0), so no override is needed for them here.

[configuration]
buggify = false
machineCount = 10
desiredTLogCount = 6
generateFearless = false
config = 'triple'
coordinators = 3

tenantModes = ['disabled']
encryptModes = ['disabled']
disableTss = true
storageCacheMachines = 0

[[knobs]]
# FIXES OFF (baseline / no-fix):
# Location-cache peer watcher disabled -> a client never evicts a dead SS from
# its location cache on connect-failure, so SS-kill stale refs are not drained.
location_cache_peer_watcher_enabled = false
# shrinkProxyList cache-clear disabled -> MonitorLeader can keep a killed
# proxy's sampled RequestStream refs pinned after recruited count drops.
shrink_proxy_list_clear_cache_below_threshold = false
# Observability ON: the pass criterion is the per-role InterfaceTracker Delta,
# which needs this bookkeeping. (Observability is NOT one of the fixes — it is
# the measurement; leaving it on is what lets the baseline's leaks register.)
stale_peer_observability = true

[[test]]
testTitle = 'StalePeerTestBaseline'
runConsistencyCheck = false
waitForQuiescenceBegin = false
waitForQuiescenceEnd = false

    [[test.workload]]
    testName = 'StalePeerTest'
    dstKillRole = 'clientFacing'
    srcCheckRole = 'tester_client'
    waitAfterKill = 60.0

    [[test.workload]]
    testName = 'Cycle'
    nodeCount = 1000
    transactionsPerSecond = 500.0
    testDuration = 200.0
    expectedRate = 0
