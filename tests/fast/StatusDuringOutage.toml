[[test]]
testTitle = 'StatusDuringOutage'

    [[test.workload]]
    testName = 'Status'
    testDuration = 60.0
    requestsPerSecond = 0.5
    # STATUS_TIMEOUT is 30s. The 2s buffer accounts for scheduling delay
    # between when the timeout fires and when the latency-measuring code
    # gets scheduled and calls now().
    maxAcceptableStatusLatency = 32.0

    [[test.workload]]
    testName = 'Attrition'
    machinesToKill = 10
    machinesToLeave = 1
    reboot = true
    testDuration = 60.0
    suspendDuration = 60.0

    [[test.workload]]
    testName = 'RandomClogging'
    testDuration = 60.0
    swizzle = 0
    scale = 1.0
    clogginess = 2.0
