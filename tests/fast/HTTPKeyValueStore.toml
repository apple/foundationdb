# FIXME: in theory it would be good to enable this at some point
# [[ knobs ]]
# http_request_id_header=1

[[knobs]]
# Dropping a log-router init reply can repeatedly restart recovery and exhaust
# this test's timeout under remote-double Attrition.
cc_recovery_init_req_allow_drop_in_sim = false

[[test]]
testTitle = 'HTTPKeyValueStoreTest'
timeout = 1000

    [[test.workload]]
    testName = 'HTTPKeyValueStore'
    testDuration = 30.0

    [[test.workload]]
    testName = 'RandomClogging'
    testDuration = 30.0

    [[test.workload]]
    testName = 'Attrition'
    machinesToKill = 10
    machinesToLeave = 3
    reboot = true
    testDuration = 30.0

    [[test.workload]]
    testName = 'Attrition'
    machinesToKill = 10
    machinesToLeave = 3
    reboot = true
    testDuration = 30.0
