[configuration]
storageEngineExcludeTypes = [4, 5]
buggify = false
faultInjection = false

[[knobs]]
enable_native_cdc = false
native_cdc_tag_count = 1

[[test]]
testTitle = 'NativeCdcDisableRestart'
runSetup = false
runConsistencyCheck = false
waitForQuiescenceBegin = false
waitForQuiescenceEnd = false
connectionFailuresDisableDuration = 1000000

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 1
    minStreamCount = 1
    maxStreamCount = 1
    keyCount = 4
    writesPerRound = 1
    rounds = 0
    drainAfterRestart = true
    operationTimeout = 180.0
