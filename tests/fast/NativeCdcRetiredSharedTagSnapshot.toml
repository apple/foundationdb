[configuration]
config = 'single'
singleRegion = true
commitProxyCount = 1
grvProxyCount = 1
resolverCount = 1
buggify = false
faultInjection = false

[[knobs]]
enable_native_cdc = true
native_cdc_tag_count = 1

[[test]]
testTitle = 'NativeCdcRetiredSharedTagSnapshot'
useDB = true
runConsistencyCheck = false
waitForQuiescenceEnd = false
connectionFailuresDisableDuration = 1000000

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 1
    minStreamCount = 1
    maxStreamCount = 1
    keyCount = 4
    writesPerRound = 1
    rounds = 1
    testRetiredSharedTagSnapshot = true
    operationTimeout = 180.0
