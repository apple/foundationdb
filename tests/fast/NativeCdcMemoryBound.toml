[configuration]
config = 'single'
singleRegion = true
buggify = false
faultInjection = false

[[knobs]]
enable_native_cdc = true
native_cdc_tag_count = 1
# Allow up to six retained 4 KiB TLog replies while keeping 32 KiB of stream fanout memory-bound.
cdc_proxy_buffer_bytes = 32768
maximum_peek_bytes = 4096
cdc_proxy_consume_poll_timeout = 30.0

[[test]]
testTitle = 'NativeCdcMemoryBound'
useDB = true
waitForQuiescenceEnd = false
connectionFailuresDisableDuration = 1000000

    [[test.workload]]
    testName = 'NativeCdcEndToEnd'
    initialStreamCount = 32
    minStreamCount = 32
    maxStreamCount = 32
    keyCount = 4
    writesPerRound = 1
    rounds = 1
    testMemoryBound = true
    memoryTestValueBytes = 1024
    drainProbability = 1.0
    delayBetweenRounds = 0.0
    operationTimeout = 120.0
