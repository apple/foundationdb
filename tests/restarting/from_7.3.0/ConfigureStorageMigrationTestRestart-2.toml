[[knobs]]
# Keep custom large-team recovery from blocking storage migration in this restart test.
dd_max_shards_on_large_teams = 0

[configuration]
storageEngineExcludeTypes=[5]
extraMachineCountDC = 2

[[test]]
testTitle = 'CloggedConfigureDatabaseTest'
runSetup=false
waitForQuiescenceBegin=false

    [[test.workload]]
    testName = 'ConfigureDatabase'
    testDuration = 300.0
    waitStoreTypeCheck = true
    storageMigrationCompatibleConf = true

    [[test.workload]]
    testName = 'RandomClogging'
    testDuration = 300.0

    [[test.workload]]
    testName = 'RandomClogging'
    testDuration = 300.0
    scale = 0.1
    clogginess = 2.0
