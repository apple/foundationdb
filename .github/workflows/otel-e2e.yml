name: OTEL & Prometheus Metrics E2E Test

on:
  push:
    branches: [ feature/prometheus-metrics-endpoint ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: RHEL 9 — OTEL UDP + Prometheus /metrics
  # ============================================================
  test-rhel9:
    name: "Linux RHEL 9"
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & Run Prometheus /metrics Test
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace foundationdb/build:rockylinux9-latest /bin/bash -c "
            dnf install -y 'dnf-command(config-manager)' &&
            dnf config-manager --set-enabled crb || true &&
            dnf install -y epel-release || true &&
            dnf install -y git cmake ninja-build gcc-c++ &&

            mkdir build &&
            cd build &&
            cmake -G Ninja -DOLD_FDB_alloc_instrumentation=ON .. &&
            ninja -j\$(nproc) fdbserver &&

            echo '=== Prometheus /metrics simulation test ===' &&
            ./bin/fdbserver -r simulation -f ../tests/fast/PrometheusMetrics.toml -b on &&

            echo '=== Prometheus output ===' &&
            cat prometheus_output.txt 2>/dev/null || echo 'No prometheus_output.txt generated'
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-rhel9
          path: |
            build/prometheus_output.txt

  # ============================================================
  # Job 2: CentOS 7 — OTEL UDP + Prometheus /metrics
  # ============================================================
  test-centos7:
    name: "Linux CentOS 7"
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & Run Prometheus /metrics Test
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace foundationdb/build:centos7-latest /bin/bash -c "
            source /opt/rh/devtoolset-11/enable &&
            # Fix CentOS 7 EOL mirror issues
            sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-* &&
            sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-* &&
            yum clean all &&
            yum install -y epel-release centos-release-scl &&
            sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-SCLo-scl.repo &&
            sed -i 's|# baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-SCLo-scl.repo &&
            yum clean all &&
            yum install -y cmake3 ninja-build &&
            ln -sf /usr/bin/cmake3 /usr/bin/cmake &&

            mkdir -p build &&
            cd build &&
            cmake -G Ninja -DOLD_FDB_alloc_instrumentation=ON .. &&
            ninja -j2 fdbserver &&

            echo '=== Prometheus /metrics simulation test ===' &&
            ./bin/fdbserver -r simulation -f ../tests/fast/PrometheusMetrics.toml -b on &&

            echo '=== Prometheus output ===' &&
            cat prometheus_output.txt 2>/dev/null || echo 'No prometheus_output.txt generated'
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-centos7
          path: |
            build/prometheus_output.txt

  # ============================================================
  # Job 3: macOS — OTEL UDP + Prometheus /metrics
  # ============================================================
  test-macos:
    name: "macOS Latest"
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja openssl@3 toml11
          brew unlink boost 2>/dev/null || true
          brew install boost@1.85
          brew link boost@1.85 --force 2>/dev/null || true

      - name: Build FDB
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja \
            -DOLD_FDB_alloc_instrumentation=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBOOST_ROOT=$(brew --prefix boost@1.85) \
            ..
          ninja -j2 fdbserver

      - name: Test Prometheus /metrics endpoint
        run: |
          cd build
          echo "=== Prometheus /metrics simulation test ==="
          ./bin/fdbserver -r simulation -f ../tests/fast/PrometheusMetrics.toml -b on

          echo "=== Prometheus output ==="
          cat prometheus_output.txt 2>/dev/null || echo "No prometheus_output.txt generated"




      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-macos
          path: |
            build/prometheus_output.txt

  # ============================================================
  # Job 4: Results Summary
  # ============================================================
  report-results:
    name: "Results Summary"
    needs: [test-rhel9, test-centos7, test-macos]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display results
        run: |
          echo "# =============================================="
          echo "#   OTEL & Prometheus E2E Test Results"
          echo "# =============================================="
          echo ""

          for platform in rhel9 centos7 macos; do
            echo "::group::$platform"
            if [ -f "output-$platform/prometheus_output.txt" ]; then
              echo "Prometheus output lines: $(wc -l < output-$platform/prometheus_output.txt)"
              echo "--- First 30 lines ---"
              head -30 "output-$platform/prometheus_output.txt"
              echo "✅ $platform: Prometheus metrics captured"
            else
              echo "⚠️  $platform: No prometheus_output.txt"
            fi
            echo "::endgroup::"
            echo ""
          done

          PASS=0
          for platform in rhel9 centos7 macos; do
            if [ -f "output-$platform/prometheus_output.txt" ]; then
              PASS=$((PASS + 1))
            fi
          done

          echo "=========================================="
          echo "SUMMARY: $PASS/3 platforms produced metrics"
          echo "=========================================="
          if [ "$PASS" -gt 0 ]; then
            echo "✅ At least one platform succeeded"
          else
            echo "❌ All platforms failed"
            exit 1
          fi
