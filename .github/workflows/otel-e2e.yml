# OTEL & Prometheus Metrics E2E Test
# Validates the /metrics endpoint exposes all OTEL metric types in Prometheus format
# Runs on: RHEL 9 (Docker) and macOS (native)

name: "OTEL & Prometheus Metrics E2E Test"

on:
  push:
    branches: ["feature/prometheus-metrics-endpoint"]
  pull_request:
    branches: ["main"]

jobs:
  # ============================================================
  # Job 1: Linux RHEL 9 — Prometheus /metrics E2E
  # ============================================================
  test-rhel9:
    name: "Linux RHEL 9"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Build FDB from source
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace foundationdb/build:rockylinux9-latest /bin/bash -c "
            dnf install -y 'dnf-command(config-manager)' &&
            dnf config-manager --set-enabled crb || true &&
            dnf install -y epel-release || true &&
            dnf install -y git cmake ninja-build gcc-c++ &&

            # Ensure clean build from source
            rm -rf build &&
            mkdir build &&
            cd build &&
            cmake -G Ninja -DOLD_FDB_alloc_instrumentation=ON .. &&
            echo '=== Starting build ===' &&
            ninja -j\$(nproc) fdbserver &&
            echo '=== Build complete ==='
          "

      - name: Verify fdbserver binary exists
        run: |
          ls -la build/bin/fdbserver
          file build/bin/fdbserver
          echo "Binary size: $(du -h build/bin/fdbserver | cut -f1)"

      - name: Run Prometheus /metrics simulation test
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/build foundationdb/build:rockylinux9-latest /bin/bash -c "
            echo '=== Running Prometheus /metrics E2E test ===' &&
            ./bin/fdbserver -r simulation -f ../tests/fast/PrometheusMetrics.toml -b on &&
            echo '' &&
            echo '=== Prometheus /metrics endpoint output ===' &&
            cat prometheus_output.txt &&
            echo '' &&
            echo '=== Validating output ===' &&
            grep -c '# TYPE' prometheus_output.txt &&
            echo 'TYPE annotations found' &&
            grep 'test_prometheus_requests' prometheus_output.txt &&
            echo 'SimpleCounter metric found' &&
            echo '=== E2E TEST PASSED ==='
          "

      - name: Upload Prometheus output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-output-rhel9
          path: build/prometheus_output.txt

  # ============================================================
  # Job 2: macOS — Prometheus /metrics E2E
  # ============================================================
  test-macos:
    name: "macOS Latest"
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja openssl@3 toml11
          brew unlink boost 2>/dev/null || true
          brew install boost@1.85
          brew link boost@1.85 --force 2>/dev/null || true

      - name: Build FDB from source
        run: |
          # Ensure clean build from source
          rm -rf build
          mkdir build
          cd build
          cmake -G Ninja \
            -DOLD_FDB_alloc_instrumentation=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBOOST_ROOT=$(brew --prefix boost@1.85) \
            ..
          echo "=== Starting build ==="
          ninja -j2 fdbserver
          echo "=== Build complete ==="

      - name: Verify fdbserver binary exists
        run: |
          ls -la build/bin/fdbserver
          file build/bin/fdbserver
          echo "Binary size: $(du -h build/bin/fdbserver | cut -f1)"

      - name: Run Prometheus /metrics simulation test
        run: |
          cd build
          echo "=== Running Prometheus /metrics E2E test ==="
          ./bin/fdbserver -r simulation -f ../tests/fast/PrometheusMetrics.toml -b on

          echo ""
          echo "=== Prometheus /metrics endpoint output ==="
          cat prometheus_output.txt

          echo ""
          echo "=== Validating output ==="
          TYPE_COUNT=$(grep -c '# TYPE' prometheus_output.txt)
          echo "Found $TYPE_COUNT TYPE annotations"
          grep 'test_prometheus_requests' prometheus_output.txt
          echo "SimpleCounter metric found"
          echo "=== E2E TEST PASSED ==="

      - name: Upload Prometheus output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-output-macos
          path: build/prometheus_output.txt

  # ============================================================
  # Job 3: Results Summary
  # ============================================================
  report-results:
    name: "Results Summary"
    needs: [test-rhel9, test-macos]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display results
        run: |
          echo "# =============================================="
          echo "#   Prometheus /metrics E2E Test Results"
          echo "# =============================================="
          echo ""

          PASS=0
          TOTAL=0

          for platform in rhel9 macos; do
            TOTAL=$((TOTAL + 1))
            echo "::group::$platform"
            if [ -f "prometheus-output-$platform/prometheus_output.txt" ]; then
              LINES=$(wc -l < "prometheus-output-$platform/prometheus_output.txt")
              TYPES=$(grep -c '# TYPE' "prometheus-output-$platform/prometheus_output.txt" || echo "0")
              echo "  Prometheus output: $LINES lines, $TYPES metric types"
              echo "  --- First 30 lines ---"
              head -30 "prometheus-output-$platform/prometheus_output.txt"
              echo ""
              echo "  ✅ $platform: E2E PASSED ($TYPES metrics exported)"
              PASS=$((PASS + 1))
            else
              echo "  ❌ $platform: No prometheus_output.txt found"
            fi
            echo "::endgroup::"
            echo ""
          done

          echo "=============================================="
          echo "SUMMARY: $PASS/$TOTAL platforms passed"
          echo "=============================================="
          if [ "$PASS" -eq "$TOTAL" ]; then
            echo "✅ All platforms passed!"
          elif [ "$PASS" -gt 0 ]; then
            echo "⚠️  Some platforms failed"
            exit 1
          else
            echo "❌ All platforms failed"
            exit 1
          fi
