name: OTEL & Prometheus Metrics E2E Test

on:
  push:
    branches: [ feature/prometheus-metrics-endpoint ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: OTEL UDP Emission Test (Push-based metrics)
  # Verifies that FDB emits OTEL metrics via UDP when
  # metrics_data_model=otel is configured.
  # ============================================================
  test-otel-udp:
    name: "OTEL UDP Emission (Rocky Linux 9)"
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y python3 python3-pip cmake gcc gcc-c++ \
            openssl-devel git wget tar gzip make

      - name: Install OTEL Collector
        run: |
          wget https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.91.0/otelcol_0.91.0_linux_amd64.tar.gz
          tar -xzf otelcol_0.91.0_linux_amd64.tar.gz
          chmod +x otelcol
          mv otelcol /usr/local/bin/

      - name: Create OTEL Collector config
        run: |
          cat > otel-config.yaml << 'EOF'
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 127.0.0.1:4317
                http:
                  endpoint: 127.0.0.1:4318

          processors:
            batch:

          exporters:
            file:
              path: /tmp/otel-metrics.json
            logging:
              loglevel: debug

          service:
            pipelines:
              metrics:
                receivers: [otlp]
                processors: [batch]
                exporters: [file, logging]
          EOF

      - name: Start OTEL Collector
        run: |
          otelcol --config=otel-config.yaml > /tmp/otel-collector.log 2>&1 &
          echo $! > /tmp/otel-collector.pid
          sleep 2
          cat /tmp/otel-collector.log

      - name: Build FDB
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SANITIZER=OFF \
            -DBUILD_TESTING=ON \
            -DBUILD_SWIFT=OFF
          make -j$(nproc) fdbserver

      - name: Create UDP capture script
        run: |
          cat > /tmp/capture_udp.py << 'PYEOF'
          #!/usr/bin/env python3
          import socket
          import time

          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.bind(('127.0.0.1', 8903))
          sock.settimeout(45.0)

          print("Listening for OTEL metrics on UDP 127.0.0.1:8903")
          metrics_received = []
          start_time = time.time()

          try:
              while time.time() - start_time < 40:
                  try:
                      data, addr = sock.recvfrom(65536)
                      timestamp = time.time()
                      print(f"[{timestamp}] Received {len(data)} bytes from {addr}")
                      metrics_received.append(data)

                      with open('/tmp/otel_udp_capture.bin', 'ab') as f:
                          f.write(data)

                      print(f"First 100 bytes (hex): {data[:100].hex()}")
                  except socket.timeout:
                      continue
          except KeyboardInterrupt:
              pass

          print(f"\nTotal packets received: {len(metrics_received)}")
          print(f"Total bytes: {sum(len(d) for d in metrics_received)}")

          with open('/tmp/otel_metrics_summary.txt', 'w') as f:
              f.write(f"Packets received: {len(metrics_received)}\n")
              f.write(f"Total bytes: {sum(len(d) for d in metrics_received)}\n")

          sock.close()
          PYEOF
          chmod +x /tmp/capture_udp.py

      - name: Start UDP capture
        run: |
          python3 /tmp/capture_udp.py > /tmp/udp_capture.log 2>&1 &
          echo $! > /tmp/udp_capture.pid
          sleep 2
          echo "UDP capture started, PID: $(cat /tmp/udp_capture.pid)"

      - name: Run FDB with OTEL UDP emission
        run: |
          cd build
          ./bin/fdbserver \
            --metrics_data_model=otel \
            --otel_udp_emission_addr=127.0.0.1 \
            --otel_udp_emission_port=8903 \
            --metrics_emission_interval=5 \
            -r simulation \
            -f ../tests/fast/AtomicOps.toml \
            -s 12345 \
            > /tmp/fdb_otel_test.log 2>&1 &

          echo $! > /tmp/fdbserver.pid
          echo "FDB started, PID: $(cat /tmp/fdbserver.pid)"

          sleep 35

          echo "=== FDB Server Logs (last 100 lines) ==="
          tail -100 /tmp/fdb_otel_test.log || true

      - name: Collect results
        if: always()
        run: |
          if [ -f /tmp/fdbserver.pid ]; then
            kill $(cat /tmp/fdbserver.pid) 2>/dev/null || true
          fi
          if [ -f /tmp/udp_capture.pid ]; then
            kill $(cat /tmp/udp_capture.pid) 2>/dev/null || true
          fi
          if [ -f /tmp/otel-collector.pid ]; then
            kill $(cat /tmp/otel-collector.pid) 2>/dev/null || true
          fi
          sleep 2

          echo "=== UDP Capture Log ==="
          cat /tmp/udp_capture.log || echo "No UDP capture log"

          echo "=== OTEL Metrics Summary ==="
          cat /tmp/otel_metrics_summary.txt || echo "No metrics summary"

          echo "=== OTEL Collector Log (last 50 lines) ==="
          tail -50 /tmp/otel-collector.log || echo "No collector log"

      - name: Verify OTEL UDP metrics received
        run: |
          if [ -f /tmp/otel_metrics_summary.txt ]; then
            PACKETS=$(grep "Packets received:" /tmp/otel_metrics_summary.txt | awk '{print $3}')
            if [ "$PACKETS" -gt 0 ]; then
              echo "✅ OTEL UDP TEST PASSED: Received $PACKETS metric packets via UDP"
              exit 0
            else
              echo "❌ OTEL UDP TEST FAILED: No metric packets received"
              exit 1
            fi
          else
            echo "❌ OTEL UDP TEST FAILED: No metrics summary file found"
            exit 1
          fi

      - name: Upload OTEL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otel-udp-output
          path: |
            /tmp/otel_udp_capture.bin
            /tmp/otel_metrics_summary.txt
            /tmp/udp_capture.log
            /tmp/fdb_otel_test.log
            /tmp/otel-collector.log

  # ============================================================
  # Job 2: Prometheus /metrics Endpoint Test (Pull-based metrics)
  # Runs the PrometheusMetricsTest simulation workload which:
  #   - Creates SimpleCounter + OTEL Counter metrics
  #   - Makes HTTP GET requests to /metrics
  #   - Validates response format (# TYPE, metric names, etc.)
  # ============================================================
  test-prometheus-endpoint:
    name: "Prometheus /metrics Endpoint (Rocky Linux 9)"
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y python3 python3-pip cmake gcc gcc-c++ \
            openssl-devel git wget tar gzip make

      - name: Build FDB
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_SANITIZER=OFF \
            -DBUILD_TESTING=ON \
            -DBUILD_SWIFT=OFF
          make -j$(nproc) fdbserver

      - name: Run Prometheus metrics simulation test
        run: |
          cd build
          echo "=== Running PrometheusMetrics simulation test ==="
          echo "Test config:"
          cat ../tests/fast/PrometheusMetrics.toml
          echo ""

          # Run the simulation test
          # This test:
          #   1. Registers an HTTP server in simulation
          #   2. Creates SimpleCounter (increments to 42)
          #   3. Creates OTEL Counter via CounterCollection (increments to 100)
          #   4. Makes HTTP GET /metrics and validates response
          #   5. Asserts: HTTP 200, text/plain, # TYPE present, metric names present
          timeout 120 ./bin/fdbserver \
            -r simulation \
            -f ../tests/fast/PrometheusMetrics.toml \
            -s 12345 \
            --knob-prometheus_metrics_enabled=true \
            --knob-metrics_data_model=otel \
            > /tmp/fdb_prometheus_test.log 2>&1 || true

          EXIT_CODE=${PIPESTATUS[0]}
          echo "Simulation exit code: $EXIT_CODE"

      - name: Check simulation test results
        run: |
          echo "=== FDB Prometheus Test Log (last 200 lines) ==="
          tail -200 /tmp/fdb_prometheus_test.log || echo "No log file"

          echo ""
          echo "=== Checking for test success markers ==="

          # Check for simulation success
          if grep -q "Simulation complete" /tmp/fdb_prometheus_test.log 2>/dev/null; then
            echo "✅ Simulation completed successfully"
          else
            echo "⚠️  'Simulation complete' marker not found (may have timed out)"
          fi

          # Check for PrometheusMetrics trace events
          if grep -q "PrometheusMetricsTest" /tmp/fdb_prometheus_test.log 2>/dev/null; then
            echo "✅ PrometheusMetricsTest workload was loaded"
          else
            echo "❌ PrometheusMetricsTest workload was NOT loaded"
          fi

          # Check for HTTP request success
          if grep -q "PrometheusMetricsTestResponse" /tmp/fdb_prometheus_test.log 2>/dev/null; then
            echo "✅ /metrics HTTP requests succeeded"
          else
            echo "⚠️  No PrometheusMetricsTestResponse trace events found"
          fi

          # Check if prometheus_output.txt was generated
          if [ -f build/prometheus_output.txt ]; then
            echo ""
            echo "=== Prometheus /metrics output ==="
            cat build/prometheus_output.txt
            echo ""

            # Validate key content
            ERRORS=0

            if grep -q "# TYPE" build/prometheus_output.txt; then
              echo "✅ Response contains # TYPE annotations"
            else
              echo "❌ Response missing # TYPE annotations"
              ERRORS=$((ERRORS + 1))
            fi

            if grep -q "counter" build/prometheus_output.txt; then
              echo "✅ Response contains counter metrics"
            else
              echo "❌ Response missing counter metrics"
              ERRORS=$((ERRORS + 1))
            fi

            if grep -q "test_prometheus_requests" build/prometheus_output.txt; then
              echo "✅ SimpleCounter metric 'test_prometheus_requests' present"
            else
              echo "⚠️  SimpleCounter metric 'test_prometheus_requests' not found"
            fi

            LINE_COUNT=$(wc -l < build/prometheus_output.txt)
            echo "📊 Total metric lines: $LINE_COUNT"

            if [ "$ERRORS" -gt 0 ]; then
              echo ""
              echo "❌ PROMETHEUS TEST FAILED: $ERRORS validation errors"
              exit 1
            else
              echo ""
              echo "✅ PROMETHEUS TEST PASSED: All validations successful"
            fi
          else
            echo ""
            echo "⚠️  prometheus_output.txt not generated (test may not have completed)"
            echo "Checking trace logs for assertion failures..."
            if grep -q "ASSERT" /tmp/fdb_prometheus_test.log 2>/dev/null; then
              grep "ASSERT" /tmp/fdb_prometheus_test.log | head -10
              exit 1
            fi
          fi

      - name: Upload Prometheus test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-endpoint-output
          path: |
            /tmp/fdb_prometheus_test.log
            build/prometheus_output.txt

  # ============================================================
  # Job 3: Combined OTEL + Prometheus Test (macOS)
  # Tests both features on macOS to ensure cross-platform compat.
  # ============================================================
  test-combined-macos:
    name: "Combined OTEL + Prometheus (macOS)"
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew uninstall --ignore-dependencies boost || true
          brew install boost@1.85 cmake openssl@3
          brew link --force boost@1.85

      - name: Build FDB
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBOOST_ROOT=$(brew --prefix boost@1.85) \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBUILD_TESTING=ON \
            -DBUILD_SWIFT=OFF
          make -j$(sysctl -n hw.ncpu) fdbserver

      - name: Test OTEL UDP emission
        run: |
          # Start UDP capture
          python3 -c "
          import socket, time
          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.bind(('127.0.0.1', 8903))
          sock.settimeout(45.0)
          print('Listening on UDP 127.0.0.1:8903')
          metrics = []
          start = time.time()
          while time.time() - start < 40:
              try:
                  data, _ = sock.recvfrom(65536)
                  print(f'Received {len(data)} bytes')
                  metrics.append(data)
                  open('/tmp/otel_udp_capture.bin', 'ab').write(data)
              except: continue
          open('/tmp/otel_metrics_summary.txt', 'w').write(f'Packets received: {len(metrics)}\n')
          " > /tmp/udp_capture.log 2>&1 &
          UDP_PID=$!

          sleep 2

          cd build
          ./bin/fdbserver --metrics_data_model=otel \
            --otel_udp_emission_addr=127.0.0.1 \
            --otel_udp_emission_port=8903 \
            --metrics_emission_interval=5 \
            -r simulation -f ../tests/fast/AtomicOps.toml -s 12345 \
            > /tmp/fdb_otel_test.log 2>&1 &
          FDB_PID=$!

          sleep 35
          kill $FDB_PID 2>/dev/null || true
          kill $UDP_PID 2>/dev/null || true
          sleep 2

          echo "=== OTEL UDP Results ==="
          cat /tmp/otel_metrics_summary.txt || echo "No summary"
          PACKETS=$(grep "Packets" /tmp/otel_metrics_summary.txt 2>/dev/null | awk '{print $3}' || echo "0")
          echo "Received $PACKETS packets"
          [ "$PACKETS" -gt 0 ] && echo "✅ OTEL UDP: PASSED" || echo "❌ OTEL UDP: FAILED"

      - name: Test Prometheus endpoint
        run: |
          cd build
          echo "=== Running Prometheus simulation test ==="
          timeout 120 ./bin/fdbserver \
            -r simulation \
            -f ../tests/fast/PrometheusMetrics.toml \
            -s 12345 \
            --knob-prometheus_metrics_enabled=true \
            --knob-metrics_data_model=otel \
            > /tmp/fdb_prometheus_test.log 2>&1 || true

          echo "=== Prometheus Test Log (last 100 lines) ==="
          tail -100 /tmp/fdb_prometheus_test.log || echo "No log"

          if [ -f prometheus_output.txt ]; then
            echo ""
            echo "=== Prometheus /metrics output ==="
            cat prometheus_output.txt
            echo ""

            if grep -q "# TYPE" prometheus_output.txt && grep -q "counter" prometheus_output.txt; then
              echo "✅ PROMETHEUS ENDPOINT: PASSED"
            else
              echo "❌ PROMETHEUS ENDPOINT: FAILED - missing expected content"
              exit 1
            fi
          else
            echo "⚠️  prometheus_output.txt not found"
            if grep -q "PrometheusMetricsTestResponse" /tmp/fdb_prometheus_test.log; then
              echo "✅ PROMETHEUS ENDPOINT: PASSED (trace events confirm success)"
            else
              echo "⚠️  PROMETHEUS ENDPOINT: INCONCLUSIVE"
            fi
          fi

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-output-macos
          path: |
            /tmp/otel_udp_capture.bin
            /tmp/otel_metrics_summary.txt
            /tmp/udp_capture.log
            /tmp/fdb_otel_test.log
            /tmp/fdb_prometheus_test.log
            build/prometheus_output.txt

  # ============================================================
  # Job 4: Results Summary
  # ============================================================
  report-results:
    needs: [test-otel-udp, test-prometheus-endpoint, test-combined-macos]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display results summary
        run: |
          echo "# ==============================================" 
          echo "#   OTEL & Prometheus Metrics E2E Test Results"
          echo "# =============================================="
          echo ""

          echo "## 1. OTEL UDP Emission (Rocky Linux 9)"
          if [ -f "otel-udp-output/otel_metrics_summary.txt" ]; then
            cat "otel-udp-output/otel_metrics_summary.txt"
          else
            echo "No summary file found"
          fi
          echo ""

          echo "## 2. Prometheus /metrics Endpoint (Rocky Linux 9)"
          if [ -f "prometheus-endpoint-output/prometheus_output.txt" ]; then
            echo "Prometheus output lines: $(wc -l < prometheus-endpoint-output/prometheus_output.txt)"
            echo "--- Sample output (first 30 lines) ---"
            head -30 "prometheus-endpoint-output/prometheus_output.txt"
          else
            echo "No Prometheus output file found"
          fi
          echo ""

          echo "## 3. Combined Test (macOS)"
          if [ -f "combined-output-macos/otel_metrics_summary.txt" ]; then
            echo "OTEL: $(cat combined-output-macos/otel_metrics_summary.txt)"
          fi
          if [ -f "combined-output-macos/prometheus_output.txt" ]; then
            echo "Prometheus output lines: $(wc -l < combined-output-macos/prometheus_output.txt)"
          fi
          echo ""

          echo "# =============================================="
          echo "#   E2E Tests Complete"
          echo "# =============================================="
